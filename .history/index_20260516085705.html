<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Downloads</title>

    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --accent: #7c5cff;
        --danger: #ff6b6b;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f6ff;
          --panel: rgba(0, 0, 0, 0.04);
          --border: rgba(0, 0, 0, 0.12);
          --text: rgba(0, 0, 0, 0.88);
          --muted: rgba(0, 0, 0, 0.62);
          --shadow: 0 20px 60px rgba(0, 0, 0, 0.14);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background:
          radial-gradient(1200px 800px at 20% 10%, rgba(124, 92, 255, 0.35), transparent 55%),
          var(--bg);
        color: var(--text);
      }

      header,
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 18px;
      }

      h1 {
        margin: 8px 0 0;
        font-size: clamp(22px, 2.3vw, 30px);
        font-weight: 780;
        letter-spacing: -0.02em;
      }

      code {
        font-family:
          ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          "Courier New",
          monospace;
      }

      .sub {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      .card {
        overflow: hidden;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .bar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      .btn {
        appearance: none;
        padding: 9px 12px;
        color: var(--text);
        font-weight: 650;
        cursor: pointer;
        background: color-mix(in oklab, var(--panel) 60%, transparent);
        border: 1px solid var(--border);
        border-radius: 12px;
      }

      .btn:hover {
        border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
      }

      .download-list {
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .download-list li + li {
        border-top: 1px solid var(--border);
      }

      .download-item {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
      }

      .file-name {
        overflow: hidden;
        color: var(--text);
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download-button {
        flex: none;
        padding: 7px 10px;
        color: var(--text);
        font-size: 12px;
        font-weight: 650;
        cursor: pointer;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 999px;
      }

      .download-button:hover {
        border-color: color-mix(in oklab, var(--accent) 65%, var(--border));
      }

      .download-button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .message {
        color: var(--muted);
      }

      .message.error {
        color: var(--danger);
      }
    </style>
  </head>

  <body>
    <header>
      <h1>ลิงก์ดาวน์โหลด</h1>
      <div class="sub">อ่านรายการไฟล์จาก <code>downloads.json</code></div>
    </header>

    <main>
      <section class="card">
        <div class="bar">
          <strong>รายการไฟล์</strong>
          <button class="btn" id="btnReload" type="button">รีเฟรช</button>
        </div>

        <ul class="download-list" id="downloadList" aria-live="polite"></ul>
      </section>
    </main>

    <script>
      const downloadList = document.getElementById("downloadList");
      const btnReload = document.getElementById("btnReload");

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function normalizeBasePath(basePath) {
        if (typeof basePath !== "string" || !basePath.trim()) {
          return ".";
        }

        return basePath.trim().replace(/\/+$/, "");
      }

      function normalizeFileName(fileName) {
        return fileName.trim().replace(/^\/+/, "");
      }

      function buildFileUrl(basePath, fileName) {
        if (basePath === ".") {
          return encodeURI(fileName);
        }

        return encodeURI(`${basePath}/${fileName}`);
      }

      function renderMessage(message, isError = false) {
        downloadList.innerHTML = `
          <li class="download-item">
            <span class="message ${isError ? "error" : ""}">${escapeHtml(message)}</span>
          </li>
        `;
      }

      async function downloadFile(url, fileName) {
        const response = await fetch(url, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`โหลดไฟล์ไม่สำเร็จ (${response.status})`);
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);

        const link = document.createElement("a");
        link.href = objectUrl;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();

        URL.revokeObjectURL(objectUrl);
      }

      function renderFiles(basePath, files) {
        const validFiles = files
          .filter((file) => typeof file === "string" && file.trim())
          .map((file) => normalizeFileName(file));

        if (validFiles.length === 0) {
          renderMessage("(ยังไม่มีไฟล์ใน downloads.json)");
          return;
        }

        downloadList.innerHTML = "";

        validFiles.forEach((fileName) => {
          const url = buildFileUrl(basePath, fileName);

          const item = document.createElement("li");
          item.className = "download-item";

          const name = document.createElement("span");
          name.className = "file-name";
          name.textContent = fileName;

          const button = document.createElement("button");
          button.className = "download-button";
          button.type = "button";
          button.textContent = "download";

          button.addEventListener("click", async () => {
            const originalText = button.textContent;

            try {
              button.disabled = true;
              button.textContent = "loading...";
              await downloadFile(url, fileName);
            } catch (error) {
              alert(`ดาวน์โหลดไม่ได้: ${error?.message || "unknown error"}\n\nตรวจว่าไฟล์นี้มีอยู่จริง: ${url}`);
            } finally {
              button.disabled = false;
              button.textContent = originalText;
            }
          });

          item.appendChild(name);
          item.appendChild(button);
          downloadList.appendChild(item);
        });
      }

      async function loadDownloadList() {
        renderMessage("(กำลังโหลดรายการ...)");

        try {
          const response = await fetch("downloads.json", { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`downloads.json โหลดไม่สำเร็จ (${response.status})`);
          }

          const manifest = await response.json();
          const basePath = normalizeBasePath(manifest.basePath);
          const files = Array.isArray(manifest.files) ? manifest.files : [];

          renderFiles(basePath, files);
        } catch (error) {
          renderMessage(`(โหลดรายการไม่ได้: ${error?.message || "unknown error"})`, true);
        }
      }

      btnReload.addEventListener("click", loadDownloadList);
      loadDownloadList();
    </script>
  </body>
</html>
